<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Number</title>
    <link rel="stylesheet" href="style.css">

    
</head>

<body>

    <div id="wrapper">
        <h1>
            Number Gussing game
        </h1>
        <p>Try and guess a number Between 1 to 100.</p>
        <p>You have 10 attempts to guess the right number</p><br>

        <form>
            <label2 for="guessField" id="guess">Guess a Number</label><br>
            <input type="text" class="guessField" id="guessField"><br>
            <input type="submit" id="subt" value="Submit guess" class="guessSubmit">

        </form>

        <div class="resultParas">
            <p>previous Guess : <span class="guesses"></span></p>
            <p>Guesses Remaing: <span class="lastResult">10</span></p>
            <p class="lowOrHi"></p>
        </div>
    </div>
<script src="script.js"></script>


</body>

</html>
