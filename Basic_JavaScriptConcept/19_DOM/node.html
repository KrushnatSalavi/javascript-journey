<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="background-color: #212121; color: antiquewhite;margin:20px;">

    <h1 style="background-color: pink;padding:30px;text-align: center;border-radius: 25px;margin: auto;">Converting HTMl node into Array</h1>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
    </ul>

    <h2>Days</h2>

    <div id="parent">
        <div>Monday</div>
        <div>Tuesday</div>
        <div>Wednesday</div>
    </div>

    <script>
        const List = document.querySelectorAll('li');
        const convertli = Array.from(List);
        console.log(List)
        console.log(List.children);

        convertli.forEach( (li)=> {
            li.style.color = "red";
        })

        for(let i=0; i < List.length; i++){
            document.write(List[i].innerHTML);
        }

        const Day = document.querySelector('#parent')
        console.log(Day);
        console.log(Day.children);
        console.log(Day.children[2].innerHTML);




    </script>
</body>

</html>
