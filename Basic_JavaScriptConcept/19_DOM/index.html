<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #caadad;
            margin: 0;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 id="title">DOM</h1>
        <p id="text">Lorem ipsum dolor sit, amet consectetur adipisicing.</p>

        <ul>
            <li>one</li>
            <li>two</li>
            <li>three</li>
            <li>four</li>
            <li>five</li>
        </ul>
    </div>

    <script>
        document.getElementById("title").innerHTML = "DOM Manipulation";
        document.getElementById("text").innerHTML = "<p>This is a simple example of DOM manipulation.</p>";

        const head = document.getElementById('title');

        head.style.backgroundColor ='pink';
        head.style.padding = '20px';

        const list = document.querySelector('ul');
        list.style.backgroundColor='pink';

        const list2 = document.querySelectorAll('li');
        list2[3].style.backgroundColor='red';

    </script>
</body>

</html>
